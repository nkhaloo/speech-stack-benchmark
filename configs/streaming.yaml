# Streaming track — separate benchmark for streaming-capable stacks (GPU lab).
# Produces results_streaming.md; never merged with the batch leaderboard.
# See docs/methodology_streaming.md.
track: streaming
gpu_index: 0
languages: [en, es, fr, ar, zh]

# The streaming contract (pre-registered regime, recorded in every row).
streaming:
  frame_sec: 0.5            # audio delivered to each stack this fine-grained
  latency_budget_sec: 2.0  # target: sentence finalized within this of turn end

streaming_stacks:
  - configs/models/stream_window_turbo_pyannote31.yaml          # baseline (growing)
  - configs/models/stream_window_turbo_pyannote31_sliding.yaml  # baseline (sliding)
  - configs/models/stream_window_medium_pyannote31.yaml         # cheaper baseline

metrics:
  der_collar: 0.5
  der_skip_overlap: false
