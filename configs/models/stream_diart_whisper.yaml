# Streaming NATIVE — diart online diarization + a local WhisperLive server
# backed by faster-whisper large-v3-turbo.
#
# NOTE: diart's defaults are pyannote/segmentation + pyannote/embedding — these
# DIFFER from batch pyannote-3.1, so accuracy does not transfer; re-measure.
id: diart-whisperlive-large-v3-turbo
family: diart
runtime: diart_whisperlive
native: true
enabled: true
model: large-v3-turbo
force_language: true
sentence_gap_sec: 0.8
# diart online diarization arm.
diart:
  segmentation: pyannote/segmentation   # gated — accept terms + HF_TOKEN
  embedding: pyannote/embedding         # gated — accept terms + HF_TOKEN
  duration: 5.0        # diart chunk length (s)
  step: 0.5            # diart hop (s) = its intrinsic latency
  latency: 2.0         # tuning winner: lower cpWER/DER and much less speaker churn
  # Published diart AMI parameters: closest pre-registered domain to these
  # short, clean multi-speaker conversations. The dataset has at most three
  # speakers; four leaves headroom without allowing runaway cluster creation.
  tau_active: 0.507
  rho_update: 0.006
  delta_new: 1.057
  max_speakers: 4
  device: cuda
whisperlive:
  host: 127.0.0.1
  port: 9090
  model: large-v3-turbo
  use_vad: true
  word_timestamps: true
  # Faster LocalAgreement promotion: require three matching snapshots and keep
  # enough recent context for corrections without carrying a long stale tail.
  same_output_threshold: 3
  send_last_n_segments: 10
  response_wait_sec: 0.05
  ready_timeout_sec: 300.0
  flush_timeout_sec: 20.0
  finalize_after_sec: 3.0
  match_tolerance_sec: 1.0
license: MIT (diart) + gated pyannote weights
weights_license: MIT
gated: true
deployment_notes: "WhisperLive server and .venv-diart client run together on the GPU."
