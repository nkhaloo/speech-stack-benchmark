# Streaming NATIVE — diart online diarization (stable online speaker IDs) +
# windowed faster-whisper for the transcript. Disabled by default: needs the
# `diart` install + gated pyannote weights in a dedicated .venv-diart, then
# re-invoke the runner with the same --run-id from that env.
#
# NOTE: diart's defaults are pyannote/segmentation + pyannote/embedding — these
# DIFFER from batch pyannote-3.1, so accuracy does not transfer; re-measure.
id: diart-whisper
family: diart
runtime: diart_whisper
native: true
enabled: false
# ASR arm (windowed) — reuses the benchmarked Whisper card.
asr: configs/models/asr_faster_whisper_large_v3_turbo.yaml
force_language: false
sentence_gap_sec: 0.8
# diart online diarization arm.
diart:
  segmentation: pyannote/segmentation   # gated — accept terms + HF_TOKEN
  embedding: pyannote/embedding         # gated — accept terms + HF_TOKEN
  duration: 5.0        # diart chunk length (s)
  step: 0.5            # diart hop (s) = its intrinsic latency
  latency: 0.5         # "min" == step; raise toward `duration` for accuracy
  tau_active: 0.5
  rho_update: 0.1
  delta_new: 0.57
  device: cuda
window:                # Whisper (ASR) windowing — diarization is online, not windowed
  policy: growing
  emit_every_sec: 2.0
  window_sec: 30.0
  finalize_after_sec: 5.0
  match_tolerance_sec: 1.0
license: MIT (diart) + gated pyannote weights
weights_license: MIT
gated: true
deployment_notes: "Native online diarization; separate .venv-diart; re-verify licenses/langs."
