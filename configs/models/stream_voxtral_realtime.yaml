# Streaming NATIVE — Voxtral Mini Realtime (true streaming ASR via vLLM's
# WebSocket /v1/realtime API) + diart online diarization. THE fully-streaming
# stack: audio is streamed once, transcription arrives append-only (<500 ms
# behind), each sentence emitted once — no re-transcription, no churn.
#
# Disabled by default: needs (1) the vLLM Realtime server in .venv-voxtral
# (>=16 GB VRAM; scripts/setup_voxtral.sh + run_voxtral_server.sh), and (2) diart
# + gated pyannote weights + websocket-client in the client env (.venv-diart).
# Both Voxtral models are Apache-2.0 & ungated; ONLY the Realtime variant covers
# all 5 target languages (batch Voxtral-Mini-3B-2507 lacks ar+zh).
id: voxtral-realtime
family: voxtral
runtime: voxtral_realtime
native: true
enabled: false
voxtral:
  ws_url: ws://127.0.0.1:8000/v1/realtime
  model: mistralai/Voxtral-Mini-4B-Realtime-2602
  connect_timeout_sec: 10
diart:
  segmentation: pyannote/segmentation   # gated — accept terms + HF_TOKEN
  embedding: pyannote/embedding         # gated — accept terms + HF_TOKEN
  duration: 5.0
  step: 0.5
  latency: 0.5
  tau_active: 0.5
  rho_update: 0.1
  delta_new: 0.57
  device: cuda
force_language: false
license: Apache-2.0 (Voxtral) + MIT diart + gated pyannote weights
weights_license: Apache-2.0
expected_vram_gb: 16
deployment_notes: "Fully streaming; vLLM Realtime server (.venv-voxtral) + diart client (.venv-diart)."
