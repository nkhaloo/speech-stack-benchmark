# Streaming NATIVE — Voxtral Mini Realtime (true streaming ASR via local vLLM)
# for the transcript, fused with diart online diarization for speaker labels.
# This is the fully-streaming stack (streaming ASR + streaming diarization).
#
# Disabled by default: needs (1) a vLLM server hosting the Voxtral Realtime
# model in .venv-voxtral (>=16 GB VRAM), and (2) diart + gated pyannote weights
# in the client env (.venv-diart). Both Voxtral models are Apache-2.0 & ungated;
# ONLY the Realtime variant covers all 5 target languages (the batch
# Voxtral-Mini-3B-2507 lacks Arabic + Chinese).
id: voxtral-realtime
family: voxtral
runtime: voxtral_realtime
native: true
enabled: false
# ASR arm — Voxtral Realtime behind a local vLLM OpenAI-compatible server.
voxtral:
  endpoint: http://127.0.0.1:8000/v1
  model: mistralai/Voxtral-Mini-4B-Realtime-2602   # 4B realtime; 13 langs incl. ar/zh
  mode: chunked            # chunked (sliding-window HTTP, runs now) | native (streaming; verify on lab)
  timeout_sec: 120
# Diarization arm — diart online clustering (see stream_diart_whisper.yaml).
diart:
  segmentation: pyannote/segmentation   # gated — accept terms + HF_TOKEN
  embedding: pyannote/embedding         # gated — accept terms + HF_TOKEN
  duration: 5.0
  step: 0.5
  latency: 0.5
  tau_active: 0.5
  rho_update: 0.1
  delta_new: 0.57
  device: cuda
force_language: false
sentence_gap_sec: 0.8
window:                   # ASR windowing (sliding keeps per-call cost bounded)
  policy: sliding
  emit_every_sec: 2.0
  window_sec: 30.0
  finalize_after_sec: 5.0
  match_tolerance_sec: 1.0
license: Apache-2.0 (Voxtral) + MIT diart + gated pyannote weights
weights_license: Apache-2.0
expected_vram_gb: 16
deployment_notes: "Fully streaming; vLLM server (.venv-voxtral) + diart client (.venv-diart)."
