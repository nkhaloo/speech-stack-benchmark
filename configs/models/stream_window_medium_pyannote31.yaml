# Streaming baseline — cheaper ASR (faster-whisper medium) + pyannote-3.1,
# growing buffer. Lower-cost reference point.
id: window-medium-pyannote31
family: windowed
runtime: windowed_stack
native: false
asr: configs/models/asr_faster_whisper_medium.yaml
