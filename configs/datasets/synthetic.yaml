# Synthetic-conversation dataset profiles.
# Deterministic: same seed + same source version => same recordings; the
# exact clip selection is saved to selection.json at preparation time.
seed: 20260717
languages: [en, es, fr, ar, zh]

# Source for real speech: Mozilla Common Voice Scripted Speech 26.0 (CC0),
# hosted by Mozilla Data Collective. Requires the [data] extra, MDC_API_KEY,
# and one-time acceptance of each locale's conditions on the MDC website.
source: commonvoice_mdc
source_kwargs:
  dataset_ids:
    en: cmqim2hn800ssnr07gvmpcnwu
    es: cmqim2spa00synr071fcp7av0
    fr: cmqim41b000tanr07q9btypkc
    ar: cmqinoh7z00wsnr07v5ixz5uo
    zh: cmqim47x700tunq074za20dq1  # Chinese (China), locale zh-CN
  download_dir: artifacts/datasets/mdc
  # Common Voice curates train/dev/test for speaker *diversity* (~1-2 clips per
  # speaker), which cannot feed the multi-clip single-speaker turns the builder
  # needs. `validated` is the full validated-clip pool with many clips/speaker.
  split: validated
  min_clips_per_speaker: 12

profiles:
  smoke:            # ~6 min/language — adapter and metric debugging
    minutes_per_language: 6
    recording_minutes: 3
    speakers_range: [2, 3]
  baseline:         # ~45 min/language — the main comparison
    minutes_per_language: 45
    recording_minutes: 5
    speakers_range: [2, 4]
  extended:         # optional larger evaluation
    minutes_per_language: 120
    recording_minutes: 6
    speakers_range: [2, 5]
